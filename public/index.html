<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LivePoll - 실시간 설문조사</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>LivePoll</h1>
      <p>실시간으로 질문하고, 답변을 바로 확인하세요. 멘티미터처럼 객관식·주관식 설문을 무료로!</p>
      <div class="hero-actions">
        <a href="/host.html" class="btn btn-primary">설문 만들기</a>
        <a href="/join.html" class="btn btn-secondary">참가하기</a>
      </div>
    </div>

    <div class="card text-center">
      <h2 class="mb-1">사용 방법</h2>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; margin-top: 1.5rem; text-align: left;">
        <div>
          <div style="font-size: 2rem; margin-bottom: 0.5rem;">1️⃣</div>
          <h3 style="color: var(--text); margin-bottom: 0.5rem;">설문 만들기</h3>
          <p>질문과 답변 유형(객관식/주관식)을 설정하고 세션을 시작하세요.</p>
        </div>
        <div>
          <div style="font-size: 2rem; margin-bottom: 0.5rem;">2️⃣</div>
          <h3 style="color: var(--text); margin-bottom: 0.5rem;">코드 공유</h3>
          <p>생성된 6자리 코드를 참가자들에게 공유하세요.</p>
        </div>
        <div>
          <div style="font-size: 2rem; margin-bottom: 0.5rem;">3️⃣</div>
          <h3 style="color: var(--text); margin-bottom: 0.5rem;">실시간 확인</h3>
          <p>참가자들의 답변이 그래프와 목록으로 실시간 반영됩니다.</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
